<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VitaCare | Entrar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/estilo.css">
    <link rel="stylesheet" href="../../css/login/login.css">
</head>

<body>
    <header class="cabecalho">
        <div class="limite-conteudo cabecalho__interno">
            <a href="../telaInicial.html" class="marca-vitacare" aria-label="VitaCare — início">
                <img class="marca-vitacare__img" src="../../img/projeto-logotipo.png" alt="" width="48" height="48" decoding="async">
                <span class="marca-vitacare__nome">VitaCare</span>
            </a>
            <nav class="cabecalho__acoes" aria-label="Links">
                <a href="telaCadastro.html">Criar conta</a>
                <a href="../outrasTelas/entreContato.html" class="cabecalho-botao-contato" aria-label="Entre em contato">
                    <i class="fas fa-phone-alt" aria-hidden="true"></i>
                    <i class="fas fa-envelope" aria-hidden="true"></i>
                    <span class="cabecalho-botao-contato__texto">Entre em Contato</span>
                </a>
            </nav>
        </div>
    </header>

    <main id="conteudo-principal">
        <p class="titulo-pagina-login">Entrar no VitaCare</p>
        <section class="secao-autenticacao" aria-labelledby="titulo-form-login">
            <div class="cartao-autenticacao">
                <h1 id="titulo-form-login" class="apenas-leitor-tela">Login</h1>
                <form id="formularioLogin" action="#" method="post">
                    <div class="grupo-campo">
                        <label for="emailLogin">E-mail</label>
                        <input type="email" id="emailLogin" name="email" required placeholder="seuemail@exemplo.com" autocomplete="username">
                    </div>
                    <div class="grupo-campo">
                        <label for="senhaLogin">Senha</label>
                        <input type="password" id="senhaLogin" name="senha" required placeholder="••••••••" autocomplete="current-password">
                    </div>
                    <div class="login-rodape-form">
                        <div class="login-links-secundarios">
                            <a href="esqueciSenha.html">Esqueci a senha</a>
                            <span class="login-links-sep" aria-hidden="true">·</span>
                            <a href="telaCadastro.html">Criar conta</a>
                        </div>
                        <button type="submit" class="botao-confirmar-acesso botao-confirmar-acesso--em-linha">Entrar</button>
                    </div>
                </form>

                <div class="login-acessar-como" role="group" aria-labelledby="login-acessar-titulo">
                    <p id="login-acessar-titulo" class="login-acessar-como__titulo">Acessar como…</p>
                    <p class="login-acessar-como__nota">Sem back-end no momento: links diretos para cada painel do protótipo.</p>
                    <nav class="login-acessar-como__nav" aria-label="Abrir painel por perfil">
                        <a href="../telasAdmin/inicioAdmin.html" class="login-acessar-como__link">Administrador</a>
                        <a href="../telasFuncionario/inicioFuncionario.html" class="login-acessar-como__link">Funcionário</a>
                        <a href="../telasPacientes/inicioPaciente.html" class="login-acessar-como__link">Paciente</a>
                        <a href="../telasMedicos/inicioMedico.html" class="login-acessar-como__link">Médico</a>
                    </nav>
                </div>
            </div>
        </section>
    </main>

    <footer class="rodape rodape--simples">
        <div class="limite-conteudo rodape-simples">
            <a href="../telaInicial.html" class="rodape-simples__marca" aria-label="VitaCare — início">
                <img src="../../img/projeto-logotipo.png" class="rodape-logotipo rodape-logotipo--compacto" alt="" width="120" height="36" decoding="async">
            </a>
            <nav class="rodape-simples__links" aria-label="Links do rodapé">
                <a href="../outrasTelas/agendar.html">Agendar</a>
                <a href="../outrasTelas/entreContato.html">Contato</a>
            </nav>
            <p class="rodape-simples__autoria">&copy; 2026 VitaCare</p>
        </div>
    </footer>

    <nav class="fab-fixo-dupla" aria-label="Ajuda e acessibilidade">
        <a href="../outrasTelas/tutorial.html" class="fab-fixo fab-fixo--tutorial"><i class="fas fa-book-open" aria-hidden="true"></i><span>Tutorial</span></a>
        <a href="../outrasTelas/acessibilidade.html" class="fab-fixo fab-fixo--a11y"><i class="fas fa-universal-access" aria-hidden="true"></i><span>Acessibilidade</span></a>
    </nav>
    <script src="../../js/vitacare-a11y.js" defer></script>
</body>

</html>
