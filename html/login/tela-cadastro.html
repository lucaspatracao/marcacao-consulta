<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VitaCare | Cadastro</title>
    <link rel="icon" type="image/png" href="../../img/projeto-logotipo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/estilo.css">
    <link rel="stylesheet" href="../../css/login/tela-cadastro.css">
</head>

<body>
    <header class="cabecalho">
        <div class="limite-conteudo cabecalho__interno">
            <a href="..\..\index.html" class="marca-vitacare" aria-label="VitaCare — início">
                <img class="marca-vitacare__img" src="../../img/projeto-logotipo.png" alt="" width="48" height="48" decoding="async">
                <span class="marca-vitacare__nome">VitaCare</span>
            </a>
            <nav class="cabecalho__acoes" aria-label="Links">
                <a href="login.html">Entrar</a>
                <a href="../outros/entre-contato.html" class="cabecalho-botao-contato" aria-label="Entre em contato">
                    <i class="fas fa-phone-alt" aria-hidden="true"></i>
                    <i class="fas fa-envelope" aria-hidden="true"></i>
                    <span class="cabecalho-botao-contato__texto">Entre em Contato</span>
                </a>
            </nav>
        </div>
    </header>

    <main id="conteudo-principal">
        <section class="secao-cadastro" aria-labelledby="titulo-cadastro">
            <p class="titulo-pagina-login">Nova conta</p>
            <div class="cartao-cadastro">
                <h1 id="titulo-cadastro" class="apenas-leitor-tela">Formulário de cadastro</h1>
                <form id="formularioCadastro" action="#" method="post">
                    <div class="grupo-campo">
                        <label for="nomeCadastro">Nome completo</label>
                        <input type="text" id="nomeCadastro" name="nome" required placeholder="Nome completo" autocomplete="name">
                    </div>
                    <div class="grupo-campo">
                        <label for="emailCadastro">E-mail</label>
                        <input type="email" id="emailCadastro" name="email" required placeholder="seuemail@exemplo.com" autocomplete="email">
                    </div>
                    <div class="grupo-campo">
                        <label for="senhaCadastro">Senha</label>
                        <input type="password" id="senhaCadastro" name="senha" required placeholder="Crie uma senha" autocomplete="new-password">
                    </div>
                    <div class="grupo-campo">
                        <label for="confirmaSenhaCadastro">Confirmar senha</label>
                        <input type="password" id="confirmaSenhaCadastro" name="confirmaSenha" required placeholder="Digite a senha novamente" autocomplete="new-password">
                    </div>

                    <hr>

                    <p class="cadastro-secao-rotulo">Dados adicionais</p>
                    <div class="grupo-campo">
                        <label for="telefoneCadastro">Telefone/Celular</label>
                        <div class="grupo-telefone">
                            <input type="tel" id="campoDdd" name="ddd" placeholder="DDD" maxlength="2" class="campo-ddd" inputmode="numeric" aria-label="DDD">
                            <input type="tel" id="telefoneCadastro" name="telefone" placeholder="00000-0000" required autocomplete="tel-national">
                        </div>
                    </div>
                    <div class="grupo-campo">
                        <label for="nascimentoCadastro">Data de nascimento</label>
                        <input type="date" id="nascimentoCadastro" name="nascimento" required autocomplete="bday">
                    </div>
                    <div class="grupo-checkbox-linha">
                        <input type="checkbox" id="confirmarDadosCadastro" name="confirmarDados">
                        <label for="confirmarDadosCadastro">Seus dados estão corretos?</label>
                    </div>
                    <div class="grupo-checkbox-linha">
                        <input type="checkbox" id="manterConectadoCadastro" name="manterConectado">
                        <label for="manterConectadoCadastro">Manter-se conectado?</label>
                    </div>

                    <div class="cadastro-rodape">
                        <a href="login.html" class="cadastro-link-login">Já possui cadastro?</a>
                        <button type="submit" class="botao-cadastro-continuar">Continuar</button>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <footer class="rodape rodape--simples">
        <div class="limite-conteudo rodape-simples">
            <a href="..\..\index.html" class="rodape-simples__marca" aria-label="VitaCare — início">
                <img src="../../img/projeto-logotipo.png" class="rodape-logotipo rodape-logotipo--compacto" alt="" width="120" height="36" decoding="async">
            </a>
            <nav class="rodape-simples__links" aria-label="Links do rodapé">
                <a href="../outros/agendar.html">Agendar</a>
                <a href="../outros/entre-contato.html">Contato</a>
            </nav>
            <p class="rodape-simples__autoria">&copy; 2026 VitaCare</p>
        </div>
    </footer>

    <div id="modalConfirmacao" class="modal-fundo" role="dialog" aria-modal="true" aria-labelledby="titulo-modal-cadastro">
        <div class="modal-conteudo">
            <h2 id="titulo-modal-cadastro" class="modal-conteudo__titulo"><i class="fas fa-question-circle" aria-hidden="true"></i> Tem certeza?</h2>
            <p>Os dados estão corretos? Deseja finalizar o cadastro?</p>
            <div class="modal-acoes">
                <button type="button" class="modal-botao modal-botao--cancelar" id="botaoModalCancelar">Não</button>
                <button type="button" class="modal-botao modal-botao--confirmar" id="botaoModalConfirmar">Sim</button>
            </div>
        </div>
    </div>

    <nav class="fab-fixo-dupla" aria-label="Ajuda e acessibilidade">
        <a href="../outros/tutorial.html" class="fab-fixo fab-fixo--tutorial"><i class="fas fa-book-open" aria-hidden="true"></i><span>Tutorial</span></a>
        <a href="../outros/acessibilidade.html" class="fab-fixo fab-fixo--a11y"><i class="fas fa-universal-access" aria-hidden="true"></i><span>Acessibilidade</span></a>
    </nav>
    
    <script src="../../js/vitacare-api.js" defer></script>
    <script src="../../js/login/cadastro.js" defer></script>
</body>

</html>
