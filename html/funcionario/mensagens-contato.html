<!DOCTYPE html>

                    <img class="marca-vitacare__img" src="../../img/projeto-logotipo.png" alt="" width="48" height="48" decoding="async">

                </a>
                <ul class="menu-lateral">
                    <li><a href="inicio-funcionario.html"><i class="fas fa-home" aria-hidden="true"></i> Início</a></li>

                    <li class="menu-lateral__item--ativo"><a href="mensagens-contato.html"><i class="fas fa-envelope-open-text" aria-hidden="true"></i> Mensagens <span class="menu-badge-notificacao" hidden>0</span></a></li>
                    <li><a href="perfil.html"><i class="fas fa-user-circle" aria-hidden="true"></i> Perfil</a></li>
                </ul>
                <div class="menu-lateral-saida">
                    <a href="../login/login.html" class="menu-lateral-botao-sair"><i class="fas fa-sign-out-alt" aria-hidden="true"></i> Sair</a>
                </div>
            </aside>

            <div class="painel-funcionario__principal">
                <header class="painel-funcionario__topo">
                    <h2 class="pagina-titulo-func"><i class="fas fa-bell" aria-hidden="true"></i> Mensagens de contato</h2>
                    <a href="../outros/entre-contato.html" class="cabecalho-botao-contato" aria-label="Entre em contato">

                        <i class="fas fa-envelope" aria-hidden="true"></i>
                        <span class="cabecalho-botao-contato__texto">Entre em Contato</span>
                    </a>
                </header>

                <div class="painel-bloco">
                    <div class="painel-bloco-cabecalho">
                        <p class="painel-bloco-cabecalho__sub">Notificações enviadas pelo formulário “Fale com a equipe”</p>
                        <div class="notificacoes-acoes">
                            <button type="button" id="botaoAtualizarMensagens" class="botao-contorno"><i class="fas fa-sync-alt"></i> Atualizar</button>
                            <button type="button" id="botaoMarcarTodasLidas" class="botao-contorno">Marcar todas como lidas</button>
                        </div>
                    </div>
                    <div id="listaMensagensContato" class="notificacoes-lista">
