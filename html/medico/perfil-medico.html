<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>VitaCare | Médico — Perfil</title>
    <link rel="icon" type="image/png" href="../../img/projeto-logotipo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/estilo.css">
    <script src="../../js/vitacare-acessibilidade.js"></script>
    <link rel="stylesheet" href="../../css/funcionario/inicio-funcionario.css">
    <link rel="stylesheet" href="../../css/medico/perfil.css">
</head>

<body>
    <main class="painel-funcionario">
        <div class="limite-conteudo painel-funcionario__corpo">
            <aside class="painel-funcionario__menu" aria-label="Menu do médico">
                <a href="..\..\index.html" class="marca-vitacare marca-vitacare--sidebar" aria-label="VitaCare — início">
                    <img class="marca-vitacare__img" src="../../img/projeto-logotipo.png" alt="" width="48" height="48" decoding="async">
                    <span class="marca-vitacare__nome">VitaCare</span>
                </a>
                <ul class="menu-lateral">
                    <li><a href="inicio-medico.html"><i class="fas fa-home" aria-hidden="true"></i> Início</a></li>
                    <li><a href="minha-agenda.html"><i class="fas fa-calendar-alt" aria-hidden="true"></i> Minha agenda</a></li>
                    <li><a href="historico-pacientes.html"><i class="fas fa-file-medical" aria-hidden="true"></i> Histórico dos pacientes</a></li>
                    <li class="menu-lateral__item--ativo"><a href="perfil-medico.html"><i class="fas fa-user-md" aria-hidden="true"></i> Perfil</a></li>
                </ul>
                <div class="menu-lateral-saida">
                    <a href="../login/login.html" class="menu-lateral-botao-sair"><i class="fas fa-sign-out-alt" aria-hidden="true"></i> Sair</a>
                </div>
            </aside>

            <div class="painel-funcionario__principal">
                <header class="painel-funcionario__topo">
                    <h2 class="pagina-titulo-medico"><i class="fas fa-id-card" aria-hidden="true"></i> Meu perfil profissional                    </h2>
                    <a href="../outros/entre-contato.html" class="cabecalho-botao-contato" aria-label="Entre em contato">
                        <i class="fas fa-phone-alt" aria-hidden="true"></i>
                        <i class="fas fa-envelope" aria-hidden="true"></i>
                        <span class="cabecalho-botao-contato__texto">Entre em Contato</span>
                    </a>
                </header>

                <div class="painel-bloco perfil-medico-form">
                    <form id="formPerfilMedico" action="#" method="post">
                        <div class="grupo-campo">
                            <label for="nomeMed">Nome completo</label>
                            <input type="text" id="nomeMed" class="campo-entrada" name="nome" required autocomplete="name">
                        </div>
                        <div class="grupo-campo">
                            <label for="crmMed">CRM</label>
                            <input type="text" id="crmMed" class="campo-entrada" name="crm" required placeholder="Ex.: 12345-SP">
                        </div>
                        <div class="grupo-campo">
                            <label for="espMed">Especialidade</label>
                            <input type="text" id="espMed" class="campo-entrada" name="especialidade" required placeholder="Ex.: Cardiologia">
                        </div>
                        <div class="grupo-campo">
                            <label for="emailMed">E-mail institucional</label>
                            <input type="email" id="emailMed" class="campo-entrada" name="email" autocomplete="email" readonly aria-readonly="true">
                        </div>
                        <div class="grupo-campo">
                            <label for="telMed">Telefone / WhatsApp</label>
                            <input type="tel" id="telMed" class="campo-entrada" name="telefone" placeholder="(11) 99999-9999" autocomplete="tel">
                        </div>
                        <p class="cadastro-campo-ajuda">Você pode alterar nome, telefone, CRM e especialidade. Para mudar e-mail ou senha, use <a href="../login/esqueci-senha.html">recuperar senha</a>.</p>
                        <button type="submit" id="botaoSalvarPerfilMed" class="botao-contorno botao-contorno--preenchido">Salvar alterações</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer class="rodape rodape--simples">
        <div class="limite-conteudo rodape-simples">
            <a href="..\..\index.html" class="rodape-simples__marca" aria-label="VitaCare — início">
                <img src="../../img/projeto-logotipo.png" class="rodape-logotipo rodape-logotipo--compacto" alt="" width="120" height="36" decoding="async">
            </a>
            <nav class="rodape-simples__links" aria-label="Links do rodapé">
                <a href="..\..\index.html">Início</a>
                <a href="../outros/entre-contato.html">Contato</a>
            </nav>
            <p class="rodape-simples__autoria">&copy; 2026 VitaCare</p>
        </div>
    </footer>

    <nav class="fab-fixo-dupla" aria-label="Ajuda e acessibilidade">
        <a href="../outros/tutorial.html" class="fab-fixo fab-fixo--tutorial"><i class="fas fa-book-open" aria-hidden="true"></i><span>Tutorial</span></a>
        <a href="../outros/acessibilidade.html" class="fab-fixo fab-fixo--a11y"><i class="fas fa-universal-access" aria-hidden="true"></i><span>Acessibilidade</span></a>
    </nav>
    
    <script src="../../js/vitacare-api.js" defer></script>
    <script src="../../js/painel/base.js" defer></script>
    <script src="../../js/painel/medico/medico-api.js" defer></script>
    <script src="../../js/painel/medico/perfil-medico.js" defer></script>
</body>

</html>
