<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>VitaCare | Agendar consulta</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/estilo.css">
</head>

<body class="pagina-com-mesh">
    <header class="cabecalho">
        <div class="limite-conteudo cabecalho__interno">
            <a href="..\..\index.html" class="marca-vitacare" aria-label="VitaCare — início">
                <img class="marca-vitacare__img" src="../../img/projeto-logotipo.png" alt="" width="48" height="48" decoding="async">
                <span class="marca-vitacare__nome">VitaCare</span>
            </a>
            <nav class="cabecalho__acoes" aria-label="Navegação">
                <a href="../telaInicial.html">Início</a>
                <a href="../login/login.html">Entrar</a>
                <a href="entreContato.html" class="cabecalho-botao-contato" aria-label="Entre em contato">
                    <i class="fas fa-phone-alt" aria-hidden="true"></i>
                    <i class="fas fa-envelope" aria-hidden="true"></i>
                    <span class="cabecalho-botao-contato__texto">Entre em Contato</span>
                </a>
            </nav>
        </div>
    </header>

    <main id="conteudo-principal">
        <section id="fluxo-agendamento" class="secao-agendamento" aria-labelledby="titulo-agendamento">
            <div class="limite-conteudo">
                <div class="secao-cabecalho">
                    <h1 id="titulo-agendamento">Agendar consulta</h1>
                </div>
                <div class="agendamento-linhas">
                    <div class="agendamento-formulario">
                        <div class="cartao-formulario">
                            <h2 class="cartao-formulario__titulo"><i class="fas fa-stethoscope" aria-hidden="true"></i> Dados do agendamento</h2>
                            <div class="grupo-campo">
                                <label for="campoEspecialidade">Especialidade</label>
                                <select id="campoEspecialidade" class="campo-entrada">
                                    <option value="cardiologia">Cardiologia</option>
                                    <option value="dermatologia">Dermatologia</option>
                                    <option value="ortopedia">Ortopedia</option>
                                    <option value="clinico">Clínico Geral</option>
                                    <option value="pediatria">Pediatria</option>
                                </select>
                            </div>
                            <div class="grupo-campo">
                                <label for="campoMedico">Profissional (opcional)</label>
                                <select id="campoMedico" class="campo-entrada">
                                    <option value="">Qualquer profissional</option>
                                    <option value="dra_ana">Dra. Ana Beatriz (Cardio)</option>
                                    <option value="dr_carlos">Dr. Carlos Mendes (Ortopedia)</option>
                                    <option value="dra_juliana">Dra. Juliana Souza (Dermato)</option>
                                    <option value="dr_roberto">Dr. Roberto Alves (Clínico)</option>
                                </select>
                            </div>
                            <div class="grupo-campo">
                                <label for="campoData">Data desejada</label>
                                <input type="date" id="campoData" class="campo-entrada" value="2026-04-15">
                            </div>
                            <button type="button" id="botaoBuscarHorarios" class="botao botao-secundario botao--largura-total">Buscar horários disponíveis <i class="fas fa-search" aria-hidden="true"></i></button>
                        </div>
                    </div>
                    <div class="agendamento-vagas">
                        <div class="cartao-vagas">
                            <h2 class="cartao-formulario__titulo"><i class="fas fa-calendar-alt" aria-hidden="true"></i> Horários disponíveis</h2>
                            <div id="areaHorarios" class="grade-horarios" role="group" aria-label="Horários disponíveis">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="rodape rodape--simples">
        <div class="limite-conteudo rodape-simples">
            <a href="../telaInicial.html" class="rodape-simples__marca" aria-label="VitaCare — início">
                <img src="../../img/projeto-logotipo.png" class="rodape-logotipo rodape-logotipo--compacto" alt="" width="120" height="36" decoding="async">
            </a>
            <nav class="rodape-simples__links" aria-label="Links do rodapé">
                <a href="../telaInicial.html">Início</a>
                <a href="../login/login.html">Entrar</a>
                <a href="entreContato.html">Contato</a>
            </nav>
            <p class="rodape-simples__autoria">&copy; 2026 VitaCare</p>
        </div>
    </footer>

    <div id="modalConfirmacao" class="modal-fundo" role="dialog" aria-modal="true" aria-labelledby="titulo-modal-confirmacao" hidden>
        <div class="modal-conteudo">
            <h2 id="titulo-modal-confirmacao" class="modal-conteudo__titulo"><i class="fas fa-question-circle" aria-hidden="true"></i> Tem certeza?</h2>
            <p>Deseja confirmar o agendamento para o horário selecionado?</p>
            <div class="modal-acoes">
                <button type="button" class="modal-botao modal-botao--cancelar" id="botaoModalCancelar">Não</button>
                <button type="button" class="modal-botao modal-botao--confirmar" id="botaoModalConfirmar">Sim</button>
            </div>
        </div>
    </div>

    <nav class="fab-fixo-dupla" aria-label="Ajuda e acessibilidade">
        <a href="tutorial.html" class="fab-fixo fab-fixo--tutorial"><i class="fas fa-book-open" aria-hidden="true"></i><span>Tutorial</span></a>
        <a href="acessibilidade.html" class="fab-fixo fab-fixo--a11y"><i class="fas fa-universal-access" aria-hidden="true"></i><span>Acessibilidade</span></a>
    </nav>
    <script src="../../js/vitacare-a11y.js" defer></script>
</body>

</html>
