<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VitaCare | Entre em contato</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/estilo.css">
    <link rel="stylesheet" href="../../css/outrasTelas/entreContato.css">
</head>

<body>
    <header class="cabecalho">
        <div class="limite-conteudo cabecalho__interno">
            <a href="..\..\index.html" class="marca-vitacare" aria-label="VitaCare — início">
                <img class="marca-vitacare__img" src="../../img/projeto-logotipo.png" alt="" width="48" height="48" decoding="async">
                <span class="marca-vitacare__nome">VitaCare</span>
            </a>
            <nav class="cabecalho__acoes" aria-label="Navegação">
                <a href="..\..\index.html">Início</a>
                <a href="../login/login.html">Entrar</a>
                <a href="#formulario-contato" class="cabecalho-botao-contato" aria-label="Ir ao formulário de contato">
                    <i class="fas fa-phone-alt" aria-hidden="true"></i>
                    <i class="fas fa-envelope" aria-hidden="true"></i>
                    <span class="cabecalho-botao-contato__texto">Entre em Contato</span>
                </a>
            </nav>
        </div>
    </header>

    <main id="conteudo-principal">
        <section class="secao-contato" aria-labelledby="titulo-contato">
            <div class="limite-conteudo contato-layout">
                <div class="contato-coluna contato-coluna--contexto">
                    <img class="contato-coluna__logo" src="../../img/projeto-logotipo.png" alt="Logotipo VitaCare" width="160" height="160" decoding="async">
                    <div class="grupo-campo">
                        <label for="tipoCaso">Motivo do contato</label>
                        <select id="tipoCaso" name="tipoCaso" class="contato-selecao" form="formularioContato" required>
                            <option value="">Selecione…</option>
                            <option value="duvidas">Dúvidas</option>
                            <option value="erros">Erros no site</option>
                            <option value="sugestoes">Sugestões</option>
                        </select>
                    </div>
                </div>

                <div class="contato-divisor" aria-hidden="true"></div>

                <div class="contato-coluna contato-coluna--formulario" id="formulario-contato">
                    <p class="contato-eyebrow">Fale com a equipe</p>
                    <h1 id="titulo-contato" class="contato-titulo-formulario">Mensagem</h1>
                    <form id="formularioContato" action="#" method="post">
                        <div class="grupo-campo">
                            <label for="nomeContato">Nome</label>
                            <input type="text" id="nomeContato" name="nome" required placeholder="Nome completo" autocomplete="name">
                        </div>
                        <div class="grupo-campo">
                            <label for="emailContato">E-mail</label>
                            <input type="email" id="emailContato" name="email" required placeholder="seuemail@exemplo.com" autocomplete="email">
                        </div>
                        <div class="grupo-campo">
                            <label for="mensagemContato">Mensagem</label>
                            <textarea id="mensagemContato" name="mensagem" rows="5" required placeholder="Descreva sua mensagem…"></textarea>
                        </div>
                        <button type="submit" class="botao-enviar">Enviar mensagem</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <div id="modalConfirmacao" class="modal-fundo" role="dialog" aria-modal="true" aria-labelledby="titulo-modal-contato">
        <div class="modal-conteudo">
            <h2 id="titulo-modal-contato" class="modal-conteudo__titulo"><i class="fas fa-question-circle" aria-hidden="true"></i> Enviar mensagem?</h2>
            <p>Confirma o envio desta mensagem?</p>
            <div class="modal-acoes">
                <button type="button" class="modal-botao modal-botao--cancelar" id="botaoModalCancelar">Cancelar</button>
                <button type="button" class="modal-botao modal-botao--confirmar" id="botaoModalConfirmar">Confirmar</button>
            </div>
        </div>
    </div>

    <footer class="rodape rodape--simples">
        <div class="limite-conteudo rodape-simples">
            <a href="../telaInicial.html" class="rodape-simples__marca" aria-label="VitaCare — início">
                <img src="../../img/projeto-logotipo.png" class="rodape-logotipo rodape-logotipo--compacto" alt="" width="120" height="36" decoding="async">
            </a>
            <nav class="rodape-simples__links" aria-label="Links do rodapé">
                <a href="../telaInicial.html">Início</a>
                <a href="agendar.html">Agendar</a>
                <a href="../login/login.html">Entrar</a>
                <a href="entreContato.html">Contato</a>
            </nav>
            <p class="rodape-simples__autoria">&copy; 2026 VitaCare</p>
        </div>
    </footer>

    <nav class="fab-fixo-dupla" aria-label="Ajuda e acessibilidade">
        <a href="tutorial.html" class="fab-fixo fab-fixo--tutorial"><i class="fas fa-book-open" aria-hidden="true"></i><span>Tutorial</span></a>
        <a href="acessibilidade.html" class="fab-fixo fab-fixo--a11y"><i class="fas fa-universal-access" aria-hidden="true"></i><span>Acessibilidade</span></a>
    </nav>
    <script src="../../js/vitacare-a11y.js" defer></script>
</body>

</html>
